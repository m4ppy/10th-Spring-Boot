spring:
  application:
    name: "swaggerer" # "umc10th"

  datasource:
    # ERD 기준 운영 DB는 MySQL이다. 다만 Swagger 확인/캡처 시 환경변수 없이도 실행되도록 H2 fallback을 둔다.
    # 실제 MySQL 사용 시 DB_DRIVER, DB_URL, DB_USER, DB_PW 환경변수를 지정하면 된다.
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${DB_URL:jdbc:h2:mem:swaggerpr;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USER:sa}
    password: ${DB_PW:}

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
